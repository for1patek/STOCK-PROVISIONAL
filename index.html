<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Órbita · Stock Provisional</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0c; --s1:#161616; --s2:#1e1e1e; --s3:#262626;
  --border:#2c2c2c; --border2:#383838;
  --text:#ece8e1; --muted:#7a7570; --muted2:#4a4642;
  --ok:#6fcf97; --warn:#e8a84a; --fire:#e86040; --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}

header{
  position:sticky;top:0;z-index:200;
  background:rgba(12,12,12,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;gap:10px;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;white-space:nowrap;}
.logo em{color:#d4a96a;font-style:normal;}
.logo small{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:.12em;margin-left:8px;vertical-align:middle;}
.header-actions{display:flex;gap:8px;align-items:center;}
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:20px;border:1px solid var(--border2);
  background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn:hover{color:var(--text);border-color:var(--muted);}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text);}
.btn.primary:hover{background:#fff;}

.tabs-vista{display:flex;border-bottom:1px solid var(--border);background:var(--s1);padding:0 16px;}
.tab-v{padding:11px 16px;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted);transition:all .2s;}
.tab-v:hover{color:var(--text);}
.tab-v.active{color:var(--text);border-bottom-color:var(--text);}

.alerta-gaps{margin:12px 16px 0;padding:10px 14px;border-radius:var(--r);background:rgba(232,168,74,.08);border:1px solid rgba(232,168,74,.25);color:var(--warn);font-size:.78rem;display:flex;align-items:center;gap:8px;}
.alerta-gaps.hidden{display:none;}

main{padding:14px 16px 80px;max-width:1080px;margin:0 auto;}

.fecha-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.btn-nav{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.btn-nav:hover{color:var(--text);border-color:var(--muted);}
.fecha-label{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--text);text-align:center;flex:1;}
.btn-hoy{padding:4px 10px;border-radius:12px;border:1px solid var(--border2);background:none;color:var(--muted);font-size:.7rem;cursor:pointer;transition:all .15s;}
.btn-hoy:hover{color:var(--text);}
.periodo-label{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text);text-align:center;flex:1;}

.seccion{margin-bottom:24px;}
.sec-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.1em;}
.sec-subtotal{margin-left:auto;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--muted);}
.sec-subtotal span{color:var(--text);}

.cat-header{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.cat-label{font-size:.6rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted2);flex:1;}
.btn-cat{padding:2px 7px;border-radius:10px;border:1px solid var(--border2);background:none;color:var(--muted2);font-size:.62rem;cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn-cat:hover{color:var(--text);border-color:var(--muted);}

/* tabla desktop */
.tabla{width:100%;border-collapse:collapse;margin-bottom:10px;}
.tabla th{text-align:left;padding:7px 10px;font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);background:var(--s2);border-bottom:1px solid var(--border);}
.tabla th.r{text-align:right;} .tabla th.c{text-align:center;}
.tabla td{padding:0;border-bottom:1px solid var(--border);}
.tabla tr:last-child td{border-bottom:none;}
.tabla tr{background:var(--s1);}
.tabla tr:hover{background:var(--s2);}
.tabla tr.inactivo{opacity:.4;}

.inp-nombre,.inp-precio{width:100%;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;color:var(--text);padding:10px 10px;}
.inp-nombre{font-size:.86rem;}
.inp-precio{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted);text-align:right;}
.inp-nombre:focus,.inp-precio:focus{background:rgba(255,255,255,.03);}

.qty-wrap{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px;}
.qbtn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.qbtn.plus:hover{background:var(--ok);color:var(--bg);border-color:var(--ok);}
.qbtn.minus:hover{background:var(--fire);color:#fff;border-color:var(--fire);}
.qty-n{font-family:'DM Mono',monospace;font-size:.88rem;font-weight:500;min-width:26px;text-align:center;color:var(--muted2);}
.qty-n.has{color:var(--ok);}
.td-sub{text-align:right;padding:10px 10px;font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted2);}
.td-sub.has{color:var(--text);}
.td-tog{text-align:center;padding:6px;}
.toggle{width:30px;height:17px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--ok);}
.toggle.off{background:var(--border2);}
.toggle::after{content:'';position:absolute;top:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:left .2s;}
.toggle.on::after{left:15px;}
.toggle.off::after{left:2px;}
.btn-eliminar{width:26px;height:26px;border-radius:6px;border:1px solid transparent;background:none;color:var(--muted2);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;padding:0;}
.btn-eliminar:hover{color:var(--fire);border-color:var(--fire);background:rgba(232,96,64,.08);}

/* botones add */
.btn-add-prod{width:100%;padding:8px;border:none;border-top:1px dashed var(--border);background:none;color:var(--muted2);font-size:.72rem;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-add-prod:hover{color:var(--ok);}
.btn-add-cat{width:100%;padding:8px;border-radius:8px;border:1px dashed var(--border2);background:none;color:var(--muted2);font-size:.72rem;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:12px;}
.btn-add-cat:hover{color:var(--text);border-color:var(--muted);}

/* caja */
.caja-dia{margin-top:18px;padding:14px 16px;border-radius:var(--r);background:var(--s2);border:1px solid var(--border2);}
.caja-grid{display:flex;flex-wrap:wrap;}
.caja-item{flex:1;min-width:110px;padding:8px 14px;border-right:1px solid var(--border);}
.caja-item:last-child{border-right:none;}
.caja-item-label{font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:4px;}
.caja-item-val{font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;color:var(--text);}
.caja-item-val.total{color:var(--ok);font-size:1.15rem;}
.caja-footer{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.notas-input{flex:1;min-width:180px;background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none;resize:none;height:36px;}
.notas-input::placeholder{color:var(--muted2);}
.notas-input:focus{border-color:var(--border2);}
.btn-guardar{padding:8px 20px;border-radius:8px;border:none;background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.8rem;cursor:pointer;transition:all .15s;}
.btn-guardar:hover{background:#fff;}
.btn-guardar.ok{background:var(--ok);}

/* resumen */
.resumen-wrap{margin-top:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabla-res{width:100%;border-collapse:collapse;background:var(--s1);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);min-width:400px;}
.tabla-res th{text-align:right;padding:7px 10px;font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);background:var(--s2);border-bottom:1px solid var(--border);white-space:nowrap;}
.tabla-res th:first-child{text-align:left;min-width:120px;}
.tabla-res td{padding:7px 10px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:.76rem;color:var(--muted2);text-align:right;}
.tabla-res td:first-child{font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--text);text-align:left;}
.tabla-res tr:last-child td{border-bottom:none;}
.tabla-res tr:hover{background:var(--s2);}
.tabla-res .cat-row td{background:var(--s2);color:var(--muted2);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;font-family:'DM Sans',sans-serif;border-top:1px solid var(--border);padding:5px 10px;}
.tabla-res .total-row td{background:var(--s3);border-top:2px solid var(--border2);font-weight:500;}
.tabla-res .total-row td:first-child{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.08em;color:var(--muted);}
.tabla-res td.hi{color:var(--text);}
.tabla-res td.hoy-col{color:#d4a96a;}
.notas-cell{font-family:'DM Sans',sans-serif !important;font-size:.72rem !important;color:var(--muted) !important;font-style:italic;}

/* overlays */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;}
.overlay.hidden{display:none;}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:22px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.08em;margin-bottom:14px;}
.modal-section{margin-bottom:14px;}
.modal-label{font-size:.7rem;color:var(--muted);margin-bottom:8px;letter-spacing:.06em;}
.modal-btns{display:flex;gap:8px;flex-wrap:wrap;}
.modal-sep{height:1px;background:var(--border);margin:14px 0;}
.file-drop{border:2px dashed var(--border2);border-radius:8px;padding:20px;text-align:center;color:var(--muted);font-size:.8rem;cursor:pointer;transition:border-color .15s;}
.file-drop:hover{border-color:var(--muted);}
#file-input{display:none;}
.modal-footer{display:flex;justify-content:flex-end;margin-top:14px;}

.modal-cat{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal-cat h2{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.08em;margin-bottom:14px;}
.field-group{margin-bottom:12px;}
.field-label{font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field-input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:6px;padding:9px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;}
.field-input:focus{border-color:var(--muted);}
.field-row{display:flex;gap:10px;}
.field-row .field-group{flex:1;}
.modal-cat-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}

/* color/emoji picker */
.color-picker-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.selected{border-color:var(--text);}
.emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.emoji-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.emoji-btn:hover{background:var(--s3);}
.emoji-btn.selected{background:var(--s3);border-color:var(--muted);}

/* consumo */
.consumo-seccion{margin-bottom:24px;border:1px solid rgba(155,113,200,.25);border-radius:var(--r);padding:12px 14px;background:rgba(100,80,160,.05);}
.consumo-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(155,113,200,.2);}
.consumo-dot{width:8px;height:8px;border-radius:50%;background:#b08fd4;flex-shrink:0;}
.consumo-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:#b08fd4;}
.consumo-badge{margin-left:auto;padding:2px 8px;border-radius:10px;background:rgba(155,113,200,.15);border:1px solid rgba(155,113,200,.3);font-size:.58rem;font-weight:600;letter-spacing:.1em;color:#b08fd4;text-transform:uppercase;}
.consumo-items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.consumo-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--s2);border:1px solid var(--border2);font-size:.76rem;color:var(--text);}
.consumo-chip .chip-qty{font-family:'DM Mono',monospace;font-weight:600;color:#b08fd4;font-size:.8rem;}
.consumo-chip .chip-del{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:.72rem;padding:0 0 0 2px;line-height:1;transition:color .12s;}
.consumo-chip .chip-del:hover{color:var(--fire);}
.consumo-add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.consumo-qty-inp{width:60px;background:var(--s2);border:1px solid var(--border2);border-radius:6px;padding:7px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;outline:none;text-align:center;}
.consumo-qty-inp:focus{border-color:var(--muted);}
.btn-consumo-add{padding:7px 12px;border-radius:6px;border:1px solid rgba(155,113,200,.4);background:rgba(155,113,200,.1);color:#b08fd4;font-size:.76rem;cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn-consumo-add:hover{background:rgba(155,113,200,.2);border-color:#b08fd4;}
.consumo-empty{font-size:.76rem;color:var(--muted2);font-style:italic;padding:4px 0;}

/* barra búsqueda */
.search-bar-wrap{margin-bottom:12px;position:relative;}
.search-bar{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px 9px 34px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;outline:none;transition:border-color .15s;}
.search-bar:focus{border-color:var(--muted);}
.search-bar::placeholder{color:var(--muted2);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:.82rem;pointer-events:none;}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted2);cursor:pointer;font-size:.78rem;padding:2px 4px;display:none;}
.search-clear.visible{display:block;}

/* semanal */
.sem-dias-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px;}
.sem-dia-card{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:9px 7px;cursor:pointer;transition:border-color .15s;}
.sem-dia-card:hover{border-color:var(--border2);}
.sem-dia-card.hoy{border-color:rgba(212,169,106,.4);background:rgba(212,169,106,.04);}
.sem-dia-card.sin-datos{opacity:.4;}
.sem-dia-card-head{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.sem-dia-card-head.hoy{color:#d4a96a;}
.sem-dia-total{font-family:'DM Mono',monospace;font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:5px;}
.sem-dia-total.cero{color:var(--muted2);}
.sem-dia-secs{display:flex;flex-direction:column;gap:2px;}
.sem-dia-sec{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted2);}
.sem-dia-sec span{color:var(--muted);}
.sem-dia-nota{margin-top:4px;padding-top:4px;border-top:1px solid var(--border);font-size:.62rem;color:var(--muted2);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sem-tabla-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sem-total-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;margin-bottom:14px;}
.sem-total-item{display:flex;flex-direction:column;gap:2px;}
.sem-total-label{font-size:.58rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);}
.sem-total-val{font-family:'DM Mono',monospace;font-size:.88rem;color:var(--text);}
.sem-total-val.ok{color:var(--ok);font-size:1rem;}
.sem-sep{width:1px;height:28px;background:var(--border);flex-shrink:0;}

.btn-print{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:20px;
  border:1px solid rgba(212,169,106,.4);
  background:rgba(212,169,106,.07);
  color:#d4a96a;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-print:hover{background:rgba(212,169,106,.18);border-color:#d4a96a;}

/* ═══ MODAL REPORTE ═══ */
.modal-reporte{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:24px;width:100%;max-width:500px;}
.modal-reporte h2{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.08em;margin-bottom:6px;}
.modal-reporte p{font-size:.78rem;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.periodo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.periodo-card{padding:14px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);cursor:pointer;transition:all .15s;text-align:center;}
.periodo-card:hover{border-color:#d4a96a;background:rgba(212,169,106,.06);}
.periodo-card.selected{border-color:#d4a96a;background:rgba(212,169,106,.1);}
.periodo-card-icon{font-size:1.4rem;margin-bottom:6px;}
.periodo-card-label{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.08em;}
.periodo-card-sub{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);margin-top:3px;}

#toast{position:fixed;bottom:20px;right:16px;z-index:500;padding:9px 16px;border-radius:8px;font-weight:600;font-size:.78rem;opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none;max-width:calc(100vw - 32px);}
#toast.show{opacity:1;transform:translateY(0);}
#toast.ok{background:var(--ok);color:var(--bg);}
#toast.warn{background:var(--warn);color:var(--bg);}
#toast.err{background:var(--fire);color:#fff;}

/* ═══ MOBILE ═══ */
@media(max-width:640px){
  /* Ocultar col precio desktop en mobile — lo mostramos inline */
  .col-precio-desktop{ display:none !important; }

  /* precio inline bajo el nombre */
  .precio-inline-wrap{
    display:flex;align-items:center;gap:3px;
    padding:1px 10px 8px;
  }
  .precio-inline-pfx{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--muted2);}
  .precio-inline-inp{
    background:none;border:none;outline:none;
    font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);
    width:72px;padding:0;
  }
  .precio-inline-inp:focus{background:rgba(255,255,255,.03);border-radius:3px;padding:1px 3px;}

  /* caja columnar */
  .caja-grid{flex-direction:column;}
  .caja-item{border-right:none !important;border-bottom:1px solid var(--border);padding:8px 14px;}
  .caja-item:last-child{border-bottom:none;}

  /* tabla resumen */

// ═══ ESTADO ═══
let catalogo=JSON.parse(JSON.stringify(CAT_BASE));
let ventas={},vista='diario',fechaActiva=hoy(),semOff=0,mesOff=0;
let editDia={},consumoDia={},busquedaDiario='';

// ═══ UTILS ═══
const DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_C=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_C=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function hoy(){return new Date().toISOString().slice(0,10);}
function parseFecha(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function sumarDias(s,n){const f=parseFecha(s);f.setDate(f.getDate()+n);return f.toISOString().slice(0,10);}
function fmtCorto(s){const f=parseFecha(s);return `${DIAS[f.getDay()]} ${f.getDate()} ${MESES_C[f.getMonth()]}`;}
function fmtLargo(s){const f=parseFecha(s);return `${DIAS[f.getDay()]} ${f.getDate()} ${MESES[f.getMonth()]} ${f.getFullYear()}`;}
function pesos(n){return n>0?'$'+n.toLocaleString('es-CL'):'—';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function isMobile(){return window.innerWidth<=640;}

function inicioSemana(off){const h=new Date(),dia=h.getDay(),lu=new Date(h);lu.setDate(h.getDate()-((dia+6)%7)+off*7);return lu.toISOString().slice(0,10);}
function diasSemana(ini){return Array.from({length:7},(_,i)=>sumarDias(ini,i));}
function inicioMes(off){const h=new Date(),d=new Date(h.getFullYear(),h.getMonth()+off,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;}
function diasMes(ini){const[y,m]=ini.split('-').map(Number),total=new Date(y,m,0).getDate();return Array.from({length:total},(_,i)=>`${y}-${String(m).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`);}

function getSecciones(){return catalogo.secciones||[];}
function getSeccion(sid){return getSecciones().find(s=>s.id===sid);}
function getProd(sid,id){const s=getSeccion(sid);if(!s)return null;for(const c of s.categorias)for(const p of c.items)if(p.id===id)return p;return null;}
function todosProds(sid){const s=getSeccion(sid);if(!s)return[];const a=[];for(const c of s.categorias)a.push(...c.items);return a;}
function todosProdsAll(){const a=[];getSecciones().forEach(s=>s.categorias.forEach(c=>a.push(...c.items)));return a;}
function totalSeccion(sid,dia){const data=ventas[dia]?.[sid]||{};return todosProds(sid).reduce((a,p)=>a+(data[p.id]||0)*p.precio,0);}
function totalDia(dia){return getSecciones().reduce((a,s)=>a+totalSeccion(s.id,dia),0);}

// ═══ ALERTAS ═══
function verificarGaps(){
  const el=document.getElementById('alerta-gaps'),txt=document.getElementById('alerta-texto');
  const gaps=[];for(let i=1;i<=7;i++){const d=sumarDias(hoy(),-i);if(!ventas[d]||!Object.keys(ventas[d]).length)gaps.push(fmtCorto(d));}
  if(!gaps.length){el.classList.add('hidden');return;}
  el.classList.remove('hidden');
  txt.textContent=gaps.length===1?`Sin registro: ${gaps[0]}`:`Sin registro en ${gaps.length} días: ${gaps.slice(0,3).join(', ')}${gaps.length>3?' y más…':''}`;
}

function navSem(n){semOff+=n;render();}
function navMes(n){mesOff+=n;render();}
function render(){verificarGaps();if(vista==='diario')renderDiario();else if(vista==='semanal')renderSemanal();else renderMensual();}

// ═══ RENDER DIARIO ═══
function renderDiario(){

  else secciones.forEach(sec=>todosProds(sec.id).forEach(p=>{if(!(p.id in editDia))editDia[p.id]=0;}));
  if(!Object.keys(consumoDia).length)consumoDia={...(guardado.consumo||{})};

  </div>`;

    const sub=calcSubtotalEdit(sec.id);

    if(filtro&&!secMatch)return;

    html+=`<div class="seccion"><div class="sec-header">
      <div class="sec-dot" style="background:${esc(sec.color)}"></div>
      <div class="sec-title" style="color:${esc(sec.color)}">${esc(sec.emoji)} ${esc(sec.nombre)}</div>
      <div class="sec-subtotal">${sub>0?`<span>${pesos(sub)}</span>`:''}</div>
      ${!filtro?`<button class="btn-cat" style="margin-left:4px" onclick="abrirModalEditarSec(${si})">✏</button>
      <button class="btn-cat" style="color:var(--fire);border-color:var(--fire)" onclick="eliminarSec(${si})">✕</button>`:''}
    </div>`;

    sec.categorias.forEach((cat,ci)=>{
      const catItems=filtro?cat.items.filter(p=>p.nombre.toLowerCase().includes(filtro)):cat.items;
      if(filtro&&!catItems.length)return;

      html+=`<div class="cat-header">
        <div class="cat-label">${esc(cat.cat)}</div>
        <button class="btn-cat" onclick="abrirModalEditarCat('${esc(sec.id)}',${ci})">✏ Renombrar</button>
        <button class="btn-cat" style="color:var(--fire);border-color:var(--fire)" onclick="eliminarCat('${esc(sec.id)}',${ci})">✕ Eliminar</button>
      </div>`;

      if(mobile){
        // MOBILE: precio inline bajo el nombre, sin col precio/subtotal separadas
        html+=`<table class="tabla"><thead><tr>
          <th style="width:48%">Producto</th>
          <th class="c" style="width:30%">Vendidos</th>
          <th class="r" style="width:17%">Total</th>
          <th class="c" style="width:5%"></th>
        </tr></thead><tbody>`;
        catItems.forEach(p=>{
          const pi=cat.items.indexOf(p);
          const qty=editDia[p.id]||0,sub=qty*p.precio;
          html+=`<tr class="${p.activo?'':'inactivo'}">
            <td style="padding:0">
              <input class="inp-nombre" value="${esc(p.nombre)}" onchange="editNombre('${esc(sec.id)}','${p.id}',this.value)" style="padding:8px 10px 3px">
              <div class="precio-inline-wrap">
                <span class="precio-inline-pfx">$</span>
                <input type="number" value="${p.precio}" class="precio-inline-inp"
                  onchange="editPrecio('${esc(sec.id)}','${p.id}',this.value)"
                  oninput="editPrecio('${esc(sec.id)}','${p.id}',this.value)">
              </div>
            </td>
            <td><div class="qty-wrap">
              <button class="qbtn minus" onclick="cambiarQty('${p.id}',-1)" ${!p.activo?'disabled':''}>−</button>
              <span class="qty-n${qty>0?' has':''}" id="qn-${p.id}">${qty}</span>
              <button class="qbtn plus" onclick="cambiarQty('${p.id}',1)" ${!p.activo?'disabled':''}>+</button>
            </div></td>

          </tr>`;
        });
        html+=`</tbody></table>`;
      } else {
        // DESKTOP
        html+=`<table class="tabla"><thead><tr>
          <th style="width:32%">Producto</th>
          <th class="r col-precio-desktop" style="width:12%">Precio</th>

        </tr></thead><tbody>`;
        catItems.forEach(p=>{
          const pi=cat.items.indexOf(p);
          const qty=editDia[p.id]||0,sub=qty*p.precio;
          html+=`<tr class="${p.activo?'':'inactivo'}">
            <td><input class="inp-nombre" value="${esc(p.nombre)}" onchange="editNombre('${esc(sec.id)}','${p.id}',this.value)"></td>

            <td><div class="qty-wrap">

              <span class="qty-n${qty>0?' has':''}" id="qn-${p.id}">${qty}</span>
              <button class="qbtn plus" onclick="cambiarQty('${p.id}',1)" ${!p.activo?'disabled':''}>+</button>

function calcSubtotalEdit(sid){return todosProds(sid).reduce((a,p)=>a+(editDia[p.id]||0)*p.precio,0);}

let _consumoSelId=null;
function filtrarConsumoProds(q){
  const res=document.getElementById('consumo-resultados'),clr=document.getElementById('consumo-busq-clear'),addRow=document.getElementById('consumo-add-row');
  if(clr)clr.className='search-clear'+(q?' visible':'');

  const filtro=q.toLowerCase();
  const allProds=[];getSecciones().forEach(s=>s.categorias.forEach(c=>c.items.forEach(p=>{if(p.activo)allProds.push({id:p.id,nombre:p.nombre});})));

  res.innerHTML=!matches.length
    ?`<div style="padding:12px;color:var(--muted2);font-size:.8rem;text-align:center;">Sin resultados</div>`
    :matches.map(p=>`<div onclick="seleccionarConsumo('${p.id}','${esc(p.nombre)}')" style="padding:9px 14px;cursor:pointer;font-size:.82rem;border-bottom:1px solid var(--border);transition:background .1s;" onmouseenter="this.style.background='var(--s3)'" onmouseleave="this.style.background=''">${esc(p.nombre)}</div>`).join('');

function seleccionarConsumo(id,nombre){

function limpiarBusqConsumo(){
  _consumoSelId=null;

function _refreshConsumoChips(){
  const allProds=todosProdsAll(),container=document.getElementById('consumo-chips');if(!container)return;
  const entries=Object.entries(consumoDia).filter(([,q])=>q>0);
  if(!entries.length){container.innerHTML=`<span class="consumo-empty">Sin consumo registrado hoy</span>`;return;}
  container.innerHTML=entries.map(([id,qty])=>{const p=allProds.find(x=>x.id===id);return `<div class="consumo-chip"><span class="chip-qty">${qty}×</span><span>${esc(p?p.nombre:id)}</span><button class="chip-del" onclick="quitarConsumo('${id}')">✕</button></div>`;}).join('');

function agregarConsumo(){

function quitarConsumo(id){delete consumoDia[id];_refreshConsumoChips();}

// ═══ QTY / EDICIÓN ═══
function cambiarQty(id,delta){
  editDia[id]=Math.max(0,(editDia[id]||0)+delta);
  const qty=editDia[id],prod=todosProdsAll().find(p=>p.id===id),sub=qty*(prod?prod.precio:0);
  const qn=document.getElementById('qn-'+id),qs=document.getElementById('qs-'+id);
  if(qn){qn.textContent=qty;qn.className='qty-n'+(qty>0?' has':'');}
  if(qs){qs.textContent=qty>0?pesos(sub):'—';qs.className='td-sub'+(qty>0?' has':'');}
  actualizarCaja();
}
function actualizarCaja(){
  const secciones=getSecciones();let tTotal=0;
  const vals=document.querySelectorAll('.caja-item-val');
  secciones.forEach((sec,i)=>{const t=calcSubtotalEdit(sec.id);tTotal+=t;if(vals[i])vals[i].textContent=t>0?pesos(t):'—';});
  if(vals[secciones.length])vals[secciones.length].textContent='$'+tTotal.toLocaleString('es-CL');
}
async function guardarDia(){
  const data={};
  getSecciones().forEach(sec=>{data[sec.id]={};todosProds(sec.id).forEach(p=>{if(editDia[p.id]>0)data[sec.id][p.id]=editDia[p.id];});});
  const cf=Object.fromEntries(Object.entries(consumoDia).filter(([,q])=>q>0));if(Object.keys(cf).length)data.consumo=cf;
  const notas=document.getElementById('notas-dia')?.value||'';if(notas)data.notas=notas;
  ventas[fechaActiva]=data;
  const btn=document.getElementById('btn-grd');btn.textContent='⏳ Guardando...';btn.disabled=true;
  try{await guardarVenta(fechaActiva,data);btn.textContent='✓ Guardado';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Guardar';btn.classList.remove('ok');btn.disabled=false;},1800);toast('Ventas guardadas','ok');verificarGaps();}
  catch(e){btn.textContent='Guardar';btn.disabled=false;toast('Error al guardar','err');}
}
function editNombre(sid,id,val){const p=getProd(sid,id);if(p&&val.trim())p.nombre=val.trim();guardarCatalogo();}
function editPrecio(sid,id,val){
  const p=getProd(sid,id);if(!p)return;p.precio=Math.max(0,parseInt(val)||0);guardarCatalogo();
  const qty=editDia[id]||0,sub=qty*p.precio,qs=document.getElementById('qs-'+id);
  if(qs){qs.textContent=qty>0?pesos(sub):'—';qs.className='td-sub'+(qty>0?' has':'');}actualizarCaja();
}
function toggleActivo(sid,id){const p=getProd(sid,id);if(p)p.activo=!p.activo;guardarCatalogo();renderDiario();}

  const ini=inicioSemana(semOff),fin=sumarDias(ini,6),dias=diasSemana(ini),h=hoy(),secciones=getSecciones();

    html+=`${i?'<div class="sem-sep"></div>':''}<div class="sem-total-item"><div class="sem-total-label">${esc(sec.emoji)} ${esc(sec.nombre)}</div><div class="sem-total-val" style="color:${esc(sec.color)}">${pesos(t)}</div></div>`;
  });
  html+=`<div class="sem-sep"></div><div class="sem-total-item"><div class="sem-total-label">Total semana</div><div class="sem-total-val ok">${granTotal>0?'$'+granTotal.toLocaleString('es-CL'):'$0'}</div></div></div>`;

  html+=`<div class="sem-dias-grid">`;
  dias.forEach((d,i)=>{
    const f=parseFecha(d),esH=d===h,t=totDias[i],sinDatos=!ventas[d]||!Object.keys(ventas[d]).length,nota=ventas[d]?.notas||'';
    html+=`<div class="sem-dia-card${esH?' hoy':''}${sinDatos?' sin-datos':''}" onclick="abrirModalNota('${d}')" title="Ver detalle">
      <div class="sem-dia-card-head${esH?' hoy':''}"><span>${DIAS[f.getDay()]}</span><span>${f.getDate()}</span></div>
      <div class="sem-dia-total${!t?' cero':''}">${t?'$'+t.toLocaleString('es-CL'):'—'}</div>
      <div class="sem-dia-secs">${secciones.map(sec=>{const ts=totalSeccion(sec.id,d);return ts?`<div class="sem-dia-sec">${esc(sec.emoji)} <span>${pesos(ts)}</span></div>`:'';}).join('')}</div>
      ${nota?`<div class="sem-dia-nota">${esc(nota.substring(0,28))}${nota.length>28?'…':''}</div>`:''}
    </div>`;
  });
  html+=`</div><div class="sem-tabla-wrap"><table class="tabla-res"><thead><tr><th>Producto</th>`;
  dias.forEach(d=>{const f=parseFecha(d),esH=d===h;html+=`<th class="${esH?'hoy-col':''}" style="min-width:46px">${DIAS[f.getDay()]}<br><span style="font-weight:400;font-size:.6rem">${f.getDate()}</span></th>`;});
  html+=`<th>Uds.</th><th>Total</th></tr></thead><tbody>`;

  secciones.forEach(sec=>{
    if(!dias.some(d=>totalSeccion(sec.id,d)>0))return;
    html+=`<tr class="cat-row"><td colspan="10" style="color:${esc(sec.color)}">${esc(sec.emoji)} ${esc(sec.nombre.toUpperCase())}</td></tr>`;
    sec.categorias.forEach(cat=>{
      if(!dias.some(d=>cat.items.some(p=>(ventas[d]?.[sec.id]?.[p.id]||0)>0)))return;
      html+=`<tr class="cat-row" style="opacity:.5"><td colspan="10" style="padding-left:18px">${esc(cat.cat)}</td></tr>`;
      cat.items.forEach(p=>{

        let totP=0;html+=`<tr><td>${esc(p.nombre)}</td>`;
        dias.forEach(d=>{const qty=(ventas[d]?.[sec.id]?.[p.id])||0;totP+=qty*p.precio;html+=`<td class="${qty?'hi':''}">${qty||'—'}</td>`;});
        html+=`<td class="hi" style="white-space:nowrap">${totalUds} ud.</td><td class="hi">${pesos(totP)}</td></tr>`;

  if(dias.some(d=>ventas[d]?.notas)){
    html+=`<tr class="cat-row"><td colspan="10">NOTAS</td></tr><tr><td style="color:var(--muted);font-size:.72rem;font-style:italic">Notas del día</td>`;

function renderMensual(){
  const ini=inicioMes(mesOff),[y,m]=ini.split('-').map(Number),dias=diasMes(ini);
  const semanas=[];for(let i=0;i<dias.length;i+=7)semanas.push(dias.slice(i,i+7));
  const secciones=getSecciones();
  let html=`<div class="fecha-bar">
    <button class="btn-nav" onclick="navMes(-1)">‹</button>

    <button class="btn-nav" onclick="navMes(1)">›</button>
    ${mesOff!==0?`<button class="btn-hoy" onclick="mesOff=0;render()">Este mes</button>`:''}
  </div><div class="resumen-wrap"><table class="tabla-res"><thead><tr><th>Producto</th>`;
  semanas.forEach((s,i)=>{const fi=parseFecha(s[0]),ff=parseFecha(s[s.length-1]);html+=`<th>Sem ${i+1}<br><span style="font-weight:400;font-size:.58rem">${fi.getDate()}–${ff.getDate()}</span></th>`;});
  html+=`<th>Uds.</th><th>Total mes</th></tr></thead><tbody>`;
  let totSems=Array(semanas.length).fill(0),granTotal=0;
  secciones.forEach(sec=>{
    if(!dias.some(d=>totalSeccion(sec.id,d)>0))return;
    html+=`<tr class="cat-row"><td colspan="${semanas.length+3}" style="color:${esc(sec.color)}">${esc(sec.emoji)} ${esc(sec.nombre.toUpperCase())}</td></tr>`;
    sec.categorias.forEach(cat=>{
      if(!dias.some(d=>cat.items.some(p=>(ventas[d]?.[sec.id]?.[p.id]||0)>0)))return;
      html+=`<tr class="cat-row" style="opacity:.5"><td colspan="${semanas.length+3}" style="padding-left:18px">${esc(cat.cat)}</td></tr>`;
      cat.items.forEach(p=>{
        const totalUds=dias.reduce((a,d)=>a+(ventas[d]?.[sec.id]?.[p.id]||0),0);if(!totalUds)return;
        let totP=0;html+=`<tr><td>${esc(p.nombre)}</td>`;
        semanas.forEach((sem,si)=>{let subSem=0;sem.forEach(d=>{subSem+=(ventas[d]?.[sec.id]?.[p.id]||0)*p.precio;});totSems[si]+=subSem;totP+=subSem;html+=`<td class="${subSem?'hi':''}">${pesos(subSem)}</td>`;});
        granTotal+=totP;html+=`<td class="hi" style="white-space:nowrap">${totalUds} ud.</td><td class="${totP?'hi':''}">${pesos(totP)}</td></tr>`;
      });
    });
  });
  html+=`<tr class="total-row"><td>TOTAL SEMANA</td>`;totSems.forEach(t=>{html+=`<td class="${t?'hi':''}">${pesos(t)}</td>`;});
  html+=`<td>—</td><td style="color:var(--ok);font-size:.88rem">${pesos(granTotal)}</td></tr></tbody></table></div>`;
  document.getElementById('main').innerHTML=html;
}

// ═══ EXPORT / IMPORT ═══
function abrirModal(){document.getElementById('overlay').classList.remove('hidden');}
function cerrarModal(){document.getElementById('overlay').classList.add('hidden');}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)cerrarModal();});
function exportar(modo){
  let datos={},label='';
  if(modo==='dia'){datos[fechaActiva]=ventas[fechaActiva]||{};label=fechaActiva;}
  else if(modo==='semana'){const ini=inicioSemana(semOff);diasSemana(ini).forEach(d=>{if(ventas[d])datos[d]=ventas[d];});label=`semana-${ini}`;}
  else{datos=ventas;label='historial-completo';}
  const json=JSON.stringify({exportado:new Date().toISOString(),version:'2.0',catalogo,ventas:datos},null,2);
  const blob=new Blob([json],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`orbita-stock-${label}.json`;a.click();URL.revokeObjectURL(url);toast('JSON exportado','ok');cerrarModal();
}
function importar(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);if(!data.ventas)throw new Error('Formato inválido');
      Object.assign(ventas,data.ventas);if(data.catalogo)catalogo=migrarCatalogo(data.catalogo);
      const ps=Object.entries(ventas).map(([fecha,d])=>guardarVenta(fecha,d));ps.push(guardarCatalogo());
      Promise.all(ps).then(()=>{toast('Backup importado','ok');cerrarModal();editDia={};render();}).catch(()=>toast('Error al importar','err'));
    }catch(err){toast('Error: archivo inválido','err');}
  };
  r.readAsText(file);input.value='';
}

// ═══ TOAST ═══
function toast(msg,tipo='ok'){
  const t=document.getElementById('toast');t.textContent=(tipo==='ok'?'✓ ':tipo==='warn'?'⚠ ':'✕ ')+msg;t.className=`show ${tipo}`;
  clearTimeout(t._t);t._t=setTimeout(()=>{t.className='';},2200);
}

// ═══ MODAL CATÁLOGO ═══
let _mcat={};
function abrirModalCat(titulo,bodyHTML,onConfirm){
  _mcat.onConfirm=onConfirm;
  document.getElementById('mcat-titulo').textContent=titulo;
  document.getElementById('mcat-body').innerHTML=bodyHTML;
  const okBtn=document.getElementById('mcat-ok');okBtn.style.display=onConfirm?'':'none';
  document.getElementById('overlay-cat').classList.remove('hidden');
  setTimeout(()=>{const f=document.querySelector('#mcat-body .field-input');if(f)f.focus();},80);
}
function cerrarModalCat(){document.getElementById('overlay-cat').classList.add('hidden');_mcat={};}
function confirmarModalCat(){if(_mcat.onConfirm)_mcat.onConfirm();}
document.getElementById('overlay-cat').addEventListener('click',function(e){if(e.target===this)cerrarModalCat();});

// productos
function abrirModalNuevoProd(sid,ci){
  abrirModalCat('Nuevo Producto',
    `<div class="field-group"><div class="field-label">Nombre</div><input class="field-input" id="mf-nombre" placeholder="Ej: Sándwich Veggie" autocomplete="off"></div>
    <div class="field-group"><div class="field-label">Precio ($)</div><input class="field-input" id="mf-precio" type="number" placeholder="0" min="0"></div>`,
    ()=>{
      const nombre=document.getElementById('mf-nombre').value.trim(),precio=Math.max(0,parseInt(document.getElementById('mf-precio').value)||0);
      if(!nombre){toast('Ingresa un nombre','warn');return;}
      const sec=getSeccion(sid);if(!sec)return;
      const id=sid[0]+'_'+nombre.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+'_'+Date.now();
      sec.categorias[ci].items.push({id,nombre,precio,activo:true});
      guardarCatalogo();cerrarModalCat();toast('Producto agregado','ok');renderDiario();
    }
  );
}
function eliminarProd(sid,ci,pi){
  const sec=getSeccion(sid);if(!sec)return;
  const p=sec.categorias[ci].items[pi];
  if(!confirm(`¿Eliminar "${p.nombre}"?`))return;
  sec.categorias[ci].items.splice(pi,1);guardarCatalogo();toast('Producto eliminado','ok');renderDiario();
}

// categorías
function abrirModalNuevaCat(sid){
  abrirModalCat('Nueva Categoría',
    `<div class="field-group"><div class="field-label">Nombre</div><input class="field-input" id="mf-catnom" placeholder="Ej: Ensaladas" autocomplete="off"></div>`,
    ()=>{const nombre=document.getElementById('mf-catnom').value.trim();if(!nombre){toast('Ingresa un nombre','warn');return;}const sec=getSeccion(sid);if(!sec)return;sec.categorias.push({cat:nombre,items:[]});guardarCatalogo();cerrarModalCat();toast('Categoría creada','ok');renderDiario();}
  );
}
function abrirModalEditarCat(sid,ci){
  const sec=getSeccion(sid);if(!sec)return;const actual=sec.categorias[ci].cat;
  abrirModalCat('Renombrar Categoría',
    `<div class="field-group"><div class="field-label">Nombre</div><input class="field-input" id="mf-catnom" value="${esc(actual)}" autocomplete="off"></div>`,
    ()=>{const nombre=document.getElementById('mf-catnom').value.trim();if(!nombre){toast('Ingresa un nombre','warn');return;}sec.categorias[ci].cat=nombre;guardarCatalogo();cerrarModalCat();toast('Categoría renombrada','ok');renderDiario();}
  );
}
function eliminarCat(sid,ci){
  const sec=getSeccion(sid);if(!sec)return;const cat=sec.categorias[ci];
  if(!confirm(`¿Eliminar la categoría "${cat.cat}" y sus ${cat.items.length} producto(s)?`))return;
  sec.categorias.splice(ci,1);guardarCatalogo();toast('Categoría eliminada','ok');renderDiario();
}

// secciones
function _colorPickerHTML(sel){return `<div class="color-picker-row">${COLORES_PRESET.map(c=>`<div class="color-swatch${c===sel?' selected':''}" style="background:${c}" onclick="this.parentElement.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('selected'));this.classList.add('selected');document.getElementById('mf-color').value='${c}'" title="${c}"></div>`).join('')}</div><input type="hidden" id="mf-color" value="${sel}">`;}
function _emojiPickerHTML(sel){return `<div class="emoji-row">${EMOJIS_PRESET.map(e=>`<button class="emoji-btn${e===sel?' selected':''}" onclick="this.parentElement.querySelectorAll('.emoji-btn').forEach(x=>x.classList.remove('selected'));this.classList.add('selected');document.getElementById('mf-emoji').value='${e}'" type="button">${e}</button>`).join('')}</div><input type="hidden" id="mf-emoji" value="${sel||EMOJIS_PRESET[0]}">`;}

function abrirModalNuevaSec(){
  abrirModalCat('Nueva Sección',
    `<div class="field-group"><div class="field-label">Nombre de la sección</div><input class="field-input" id="mf-secnom" placeholder="Ej: Fuente de Soda" autocomplete="off"></div>
    <div class="field-group"><div class="field-label">Emoji</div>${_emojiPickerHTML('🍔')}</div>
    <div class="field-group"><div class="field-label">Color</div>${_colorPickerHTML(COLORES_PRESET[0])}</div>`,
    ()=>{
      const nombre=document.getElementById('mf-secnom').value.trim(),emoji=document.getElementById('mf-emoji').value||'🍔',color=document.getElementById('mf-color').value||COLORES_PRESET[0];
      if(!nombre){toast('Ingresa un nombre','warn');return;}
      const id='sec_'+nombre.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+'_'+Date.now();
      catalogo.secciones.push({id,nombre,emoji,color,categorias:[]});
      guardarCatalogo();cerrarModalCat();toast('Sección creada','ok');renderDiario();
    }
  );
}
function abrirModalEditarSec(si){
  const sec=catalogo.secciones[si];if(!sec)return;
  abrirModalCat('Editar Sección',
    `<div class="field-group"><div class="field-label">Nombre</div><input class="field-input" id="mf-secnom" value="${esc(sec.nombre)}" autocomplete="off"></div>
    <div class="field-group"><div class="field-label">Emoji</div>${_emojiPickerHTML(sec.emoji)}</div>
    <div class="field-group"><div class="field-label">Color</div>${_colorPickerHTML(sec.color)}</div>`,
    ()=>{
      const nombre=document.getElementById('mf-secnom').value.trim(),emoji=document.getElementById('mf-emoji').value||sec.emoji,color=document.getElementById('mf-color').value||sec.color;
      if(!nombre){toast('Ingresa un nombre','warn');return;}
      sec.nombre=nombre;sec.emoji=emoji;sec.color=color;
      guardarCatalogo();cerrarModalCat();toast('Sección actualizada','ok');renderDiario();
    }
  );
}
function eliminarSec(si){
  const sec=catalogo.secciones[si];if(!sec)return;
  const numProds=sec.categorias.reduce((a,c)=>a+c.items.length,0);
  if(!confirm(`¿Eliminar la sección "${sec.nombre}" con ${sec.categorias.length} categoría(s) y ${numProds} producto(s)?`))return;
  catalogo.secciones.splice(si,1);guardarCatalogo();toast('Sección eliminada','ok');renderDiario();
}

// ═══ REPORTE DE RENDIMIENTO ═══
let periodoReporte='dia';

function abrirModalReporte(){
  const ini=inicioSemana(semOff),fin=sumarDias(ini,6);
  const iniMes=inicioMes(mesOff);const[y,m]=iniMes.split('-').map(Number);
  document.getElementById('pc-dia-sub').textContent=fmtCorto(fechaActiva);
  document.getElementById('pc-sem-sub').textContent=`${fmtCorto(ini)} – ${fmtCorto(fin)}`;
  document.getElementById('pc-mes-sub').textContent=`${MESES[m-1]} ${y}`;
  selPeriodo('dia');
  document.getElementById('overlay-reporte').classList.remove('hidden');
}
function cerrarModalReporte(){document.getElementById('overlay-reporte').classList.add('hidden');}
document.addEventListener('DOMContentLoaded',()=>{
  const ov=document.getElementById('overlay-reporte');
  if(ov)ov.addEventListener('click',function(e){if(e.target===this)cerrarModalReporte();});
});
function selPeriodo(p){
  periodoReporte=p;
  ['dia','semana','mes'].forEach(x=>document.getElementById('pc-'+x).classList.toggle('selected',x===p));
}

function cargarRecetasParaReporte(){
  // Lee recetas del localStorage (sincronizadas por Recetas.html)
  try{const r=localStorage.getItem('orb_recs');return r?JSON.parse(r):[];}catch(e){return[];}
}
function costoIngRep(ing){if(ing.costoFijo>0)return ing.costoFijo;if(ing.precioKg>0&&ing.gramos>0)return(ing.precioKg/1000)*ing.gramos;return 0;}
function costoRecRep(r){return r.bloques.reduce((a,b)=>a+b.ings.reduce((s,i)=>s+costoIngRep(i),0),0);}

function generarReporte(){
  cerrarModalReporte();
  let diasR=[];let periodoLabel='';
  if(periodoReporte==='dia'){diasR=[fechaActiva];periodoLabel=fmtLargo(fechaActiva);}
  else if(periodoReporte==='semana'){const ini=inicioSemana(semOff);diasR=diasSemana(ini);periodoLabel=`Semana ${fmtCorto(ini)} – ${fmtCorto(sumarDias(ini,6))}`;}
  else{const ini=inicioMes(mesOff);diasR=diasMes(ini);const[y,m]=ini.split('-').map(Number);periodoLabel=`${MESES[m-1]} ${y}`;}

  const recetas=cargarRecetasParaReporte();
  const recMap={};
  recetas.forEach(r=>{recMap[r.nombre.toLowerCase().trim()]=r;if(r.id)recMap[r.id]=r;});

  const secciones=getSecciones();
  const prodStats={};
  secciones.forEach(sec=>{
    sec.categorias.forEach(cat=>{
      cat.items.forEach(p=>{
        let uds=0,ingresos=0;
        diasR.forEach(d=>{const q=ventas[d]?.[sec.id]?.[p.id]||0;uds+=q;ingresos+=q*p.precio;});
        if(uds>0){
          const rec=recMap[p.nombre.toLowerCase().trim()]||(p.recetaId?recMap[p.recetaId]:null);
          const costo=rec?costoRecRep(rec)*uds:null;
          const ganancia=costo!==null?ingresos-costo-ingresos*0.19:null;
          const margen=costo!==null&&ingresos>0?((ingresos-costo-ingresos*0.19)/ingresos)*100:null;
          prodStats[p.id]={nombre:p.nombre,seccion:sec.nombre,secColor:sec.color,secEmoji:sec.emoji,uds,ingresos,costo,ganancia,margen,precio:p.precio};
        }
      });
    });
  });

  const prods=Object.values(prodStats);
  const totalIngresos=prods.reduce((a,p)=>a+p.ingresos,0);
  const totalUds=prods.reduce((a,p)=>a+p.uds,0);
  const prodsConMargen=prods.filter(p=>p.margen!==null);
  const byIngresos=[...prods].sort((a,b)=>b.ingresos-a.ingresos);
  const byUds=[...prods].sort((a,b)=>b.uds-a.uds);
  const byMargen=[...prodsConMargen].sort((a,b)=>b.margen-a.margen);
  const secStats={};
  secciones.forEach(s=>{secStats[s.id]={nombre:s.nombre,emoji:s.emoji,color:s.color,ingresos:0,uds:0};});
  prods.forEach(p=>{const s=secciones.find(s=>s.nombre===p.seccion);if(s){secStats[s.id].ingresos+=p.ingresos;secStats[s.id].uds+=p.uds;}});

  const p2=n=>n>0?'$'+Math.round(n).toLocaleString('es-CL'):'—';
  const fPct=n=>n!==null?n.toFixed(1)+'%':'—';
  const mCol=m=>m===null?'#888':m>=50?'#27ae60':m>=30?'#e67e22':'#c0392b';
  const mCls=m=>m===null?'':m>=50?'ok':m>=30?'warn':'fire';

  let h=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<title>Reporte · ${periodoLabel}</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f2ef;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:13px;padding:24px;max-width:920px;margin:0 auto}
.rpt-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #1a1a1a}
.rpt-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.1em}
.rpt-logo em{color:#c9963c;font-style:normal}
.rpt-logo small{font-family:'DM Mono',monospace;font-size:.55rem;color:#888;letter-spacing:.12em;margin-left:8px}
.rpt-info{text-align:right}
.rpt-periodo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:#333}
.rpt-emision{font-family:'DM Mono',monospace;font-size:.62rem;color:#999;margin-top:3px}
.sec-tit{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.14em;color:#999;text-transform:uppercase;margin:22px 0 8px;padding-bottom:4px;border-bottom:1px solid #ddd}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px}

.kpi-lbl{font-size:.56rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-bottom:4px}
.kpi-val{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:500}
.kpi-val.ok{color:#27ae60}
.sec-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.sec-card{background:#fff;border-radius:8px;padding:10px 12px;border-left:3px solid #ccc}
.sec-card-lbl{font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#aaa;margin-bottom:3px}
.sec-card-val{font-family:'DM Mono',monospace;font-size:.9rem;font-weight:500}
.sec-bar-wrap{margin-top:5px;height:3px;background:#eee;border-radius:2px;overflow:hidden}
.sec-bar{height:100%;border-radius:2px}
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:4px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e8e5e0;margin-bottom:14px}
thead{background:#f0ede8}
th{text-align:left;padding:7px 10px;font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#999;border-bottom:1px solid #e0ddd8}
th.r{text-align:right}
td{padding:7px 10px;border-bottom:1px solid #f0ede8;font-size:.79rem}
td.r{text-align:right;font-family:'DM Mono',monospace;font-size:.74rem;color:#555}
td.ok{color:#27ae60}td.warn{color:#e67e22}td.fire{color:#c0392b}
tr:last-child td{border-bottom:none}tr:hover{background:#faf9f7}
.rank-num{font-family:'DM Mono',monospace;font-weight:600;color:#ccc;margin-right:4px}
.prod-sec{display:inline-block;padding:1px 6px;border-radius:10px;font-size:.58rem;font-weight:600;margin-top:2px}
.total-row td{background:#f0ede8;font-weight:600;font-family:'DM Mono',monospace}
.sin-rec{font-size:.6rem;color:#bbb;font-style:italic}
.print-btn{position:fixed;bottom:20px;right:20px;padding:10px 20px;background:#1a1a1a;color:#fff;border:none;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.print-btn:hover{background:#333}
@media print{.print-btn{display:none}@page{margin:14mm 12mm}body{padding:0;background:#fff}}
</style></head><body>
<button class="print-btn" onclick="window.print()">🖨 Imprimir / PDF</button>
<div class="rpt-header">
  <div><div class="rpt-logo">ÓRBIT<em>A</em><small>STOCK</small></div><div style="font-family:'DM Mono',monospace;font-size:.6rem;color:#999;margin-top:2px">Reporte de Rendimiento</div></div>
  <div class="rpt-info">
    <div class="rpt-periodo">${periodoLabel}</div>
    <div class="rpt-emision">Emitido ${new Date().toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
  </div>
</div>`;

  // KPIs
  h+=`<div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">Ingresos</div><div class="kpi-val ok">${p2(totalIngresos)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Unidades vendidas</div><div class="kpi-val">${totalUds}</div></div>
    <div class="kpi"><div class="kpi-lbl">Productos distintos</div><div class="kpi-val">${prods.length}</div></div>
    <div class="kpi"><div class="kpi-lbl">Con margen calculado</div><div class="kpi-val">${prodsConMargen.length}${prods.length>0?` <span style="font-size:.7rem;color:#aaa">/ ${prods.length}</span>`:''}</div></div>
  </div>`;

  // Participación por sección
  const secsConVentas=Object.values(secStats).filter(s=>s.ingresos>0).sort((a,b)=>b.ingresos-a.ingresos);
  if(secsConVentas.length){
    h+=`<div class="sec-tit">Participación por sección</div><div class="sec-cards">`;
    secsConVentas.forEach(s=>{const pct=totalIngresos>0?s.ingresos/totalIngresos*100:0;
      h+=`<div class="sec-card" style="border-left-color:${s.color}">
        <div class="sec-card-lbl">${s.emoji} ${s.nombre}</div>
        <div class="sec-card-val" style="color:${s.color}">${p2(s.ingresos)}</div>
        <div style="font-size:.6rem;color:#aaa;margin-top:2px">${pct.toFixed(1)}% · ${s.uds} uds.</div>
        <div class="sec-bar-wrap"><div class="sec-bar" style="width:${pct}%;background:${s.color}"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Rankings por ingresos y unidades
  h+=`<div class="sec-tit">Rankings</div><div class="rank-grid">`;
  h+=`<table><thead><tr><th>🏆 Más ingresos</th><th class="r">Uds.</th><th class="r">Total</th><th class="r">Margen</th></tr></thead><tbody>`;
  byIngresos.slice(0,8).forEach((p,i)=>{
    h+=`<tr><td><span class="rank-num">${i+1}</span>${p.nombre}<br>
      <span class="prod-sec" style="background:${p.secColor}20;color:${p.secColor}">${p.seccion}</span></td>
      <td class="r">${p.uds}</td><td class="r">${p2(p.ingresos)}</td>
      <td class="r ${mCls(p.margen)}">${p.margen!==null?fPct(p.margen):'<span class="sin-rec">sin receta</span>'}</td></tr>`;
  });
  h+=`</tbody></table>`;

  h+=`<table><thead><tr><th>📦 Más vendidos</th><th class="r">Uds.</th><th class="r">Total</th><th class="r">Margen</th></tr></thead><tbody>`;
  byUds.slice(0,8).forEach((p,i)=>{
    h+=`<tr><td><span class="rank-num">${i+1}</span>${p.nombre}<br>
      <span class="prod-sec" style="background:${p.secColor}20;color:${p.secColor}">${p.seccion}</span></td>
      <td class="r">${p.uds}</td><td class="r">${p2(p.ingresos)}</td>
      <td class="r ${mCls(p.margen)}">${p.margen!==null?fPct(p.margen):'<span class="sin-rec">sin receta</span>'}</td></tr>`;
  });
  h+=`</tbody></table></div>`;

  // Por margen (si hay recetas)
  if(byMargen.length>=2){
    h+=`<div class="rank-grid">`;
    h+=`<table><thead><tr><th>💚 Mejor margen</th><th class="r">Uds.</th><th class="r">Ganancia</th><th class="r">Margen %</th></tr></thead><tbody>`;
    byMargen.slice(0,8).forEach((p,i)=>{
      h+=`<tr><td><span class="rank-num">${i+1}</span>${p.nombre}</td>
        <td class="r">${p.uds}</td><td class="r ok">${p2(p.ganancia)}</td>
        <td class="r ${mCls(p.margen)}">${fPct(p.margen)}</td></tr>`;
    });
    h+=`</tbody></table>`;
    h+=`<table><thead><tr><th>🔴 Menor margen</th><th class="r">Uds.</th><th class="r">Ganancia</th><th class="r">Margen %</th></tr></thead><tbody>`;
    [...byMargen].reverse().slice(0,8).forEach((p,i)=>{
      h+=`<tr><td><span class="rank-num">${i+1}</span>${p.nombre}</td>
        <td class="r">${p.uds}</td><td class="r">${p2(p.ganancia)}</td>
        <td class="r ${mCls(p.margen)}">${fPct(p.margen)}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }

  // Menos vendidos
  if(prods.length>5){
    const menosVend=[...prods].sort((a,b)=>a.uds-b.uds).slice(0,5);
    h+=`<div class="sec-tit">Menos vendidos</div>
    <table><thead><tr><th>Producto</th><th>Sección</th><th class="r">Uds.</th><th class="r">Ingresos</th><th class="r">Margen</th></tr></thead><tbody>`;
    menosVend.forEach(p=>{
      h+=`<tr><td>${p.nombre}</td><td><span class="prod-sec" style="background:${p.secColor}20;color:${p.secColor}">${p.seccion}</span></td>
        <td class="r">${p.uds}</td><td class="r">${p2(p.ingresos)}</td>
        <td class="r ${mCls(p.margen)}">${p.margen!==null?fPct(p.margen):'<span class="sin-rec">sin receta</span>'}</td></tr>`;
    });
    h+=`</tbody></table>`;
  }

  // Flujo temporal
  if(periodoReporte!=='dia'){
    h+=`<div class="sec-tit">Flujo de ingresos</div>
    <table><thead><tr><th>Fecha</th>`;
    const secsActivas=secciones.filter(s=>diasR.some(d=>totalSeccion(s.id,d)>0));
    secsActivas.forEach(s=>{h+=`<th class="r">${s.emoji} ${s.nombre}</th>`;});
    h+=`<th class="r">Total día</th><th>Notas</th></tr></thead><tbody>`;
    diasR.forEach(d=>{
      const t=totalDia(d);if(!t&&!ventas[d]?.notas)return;
      const f=parseFecha(d);
      h+=`<tr><td><strong>${DIAS[f.getDay()]}</strong> ${f.getDate()} ${MESES_C[f.getMonth()]}</td>`;
      secsActivas.forEach(s=>{const ts=totalSeccion(s.id,d);h+=`<td class="r" style="color:${ts?s.color:'#ddd'}">${ts?p2(ts):'—'}</td>`;});
      h+=`<td class="r"><strong>${p2(t)}</strong></td><td style="color:#aaa;font-size:.65rem;font-style:italic">${ventas[d]?.notas||''}</td></tr>`;
    });
    const gt=diasR.reduce((a,d)=>a+totalDia(d),0);
    h+=`<tr class="total-row"><td>TOTAL</td>`;
    secsActivas.forEach(s=>{const ts=diasR.reduce((a,d)=>a+totalSeccion(s.id,d),0);h+=`<td class="r">${p2(ts)}</td>`;});
    h+=`<td class="r" style="color:#27ae60">${p2(gt)}</td><td></td></tr></tbody></table>`;
  }

  h+=`</body></html>`;
  const w=window.open('','_blank');
  if(w){w.document.write(h);w.document.close();}
  else{toast('Habilitá popups para ver el reporte','warn');}
}

// Listener para cerrar modal reporte
document.getElementById('overlay-reporte').addEventListener('click',function(e){if(e.target===this)cerrarModalReporte();});

// ═══ INIT ═══
async function init(){
  document.getElementById('main').innerHTML=`<div style="text-align:center;padding:80px 0;color:var(--muted);"><div style="font-size:2rem;margin-bottom:14px;">⏳</div><div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;">Cargando datos...</div></div>`;
  if(online){
    try{
      const[catRemoto,vtasRemoto]=await Promise.all([sbGetCatalogo(),sbGetVentas()]);
      if(catRemoto){catalogo=migrarCatalogo(catRemoto);localStorage.setItem('orbita_cat',JSON.stringify(catalogo));}
      if(vtasRemoto){ventas=vtasRemoto;localStorage.setItem('orbita_vtas',JSON.stringify(ventas));}
      await sincronizarPendientes();
    }catch(e){
      const lsCat=localStorage.getItem('orbita_cat'),lsVtas=localStorage.getItem('orbita_vtas');
      if(lsCat)catalogo=migrarCatalogo(JSON.parse(lsCat));if(lsVtas)ventas=JSON.parse(lsVtas);
      toast('Error al conectar — usando datos locales','warn');
    }
  }else{
    const lsCat=localStorage.getItem('orbita_cat'),lsVtas=localStorage.getItem('orbita_vtas');
    if(lsCat)catalogo=migrarCatalogo(JSON.parse(lsCat));if(lsVtas)ventas=JSON.parse(lsVtas);
    toast('Sin conexión — usando datos locales','warn');
  }
  updateOnlineIndicator();render();
}
init();
</script>
